services:
  - type: web
    name: motif-backend
    runtime: docker
    plan: starter
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WEAVIATE_URL
        sync: false
      - key: MOTIF_COLLECTION
        value: MotifChunk
      - key: EMBEDDING_PROVIDER
        value: local
      - key: PUTER_AUTH_TOKEN
        sync: false
      - key: PUTER_MODEL
        value: gpt-5.4-nano
      - key: FRONTEND_ORIGIN
        sync: false
